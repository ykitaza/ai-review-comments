<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Review Comments — sample HTML</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: -apple-system, "Hiragino Sans", sans-serif; color: #1a1a2e; line-height: 1.7; }
      header.hero {
        background: linear-gradient(135deg, #4f8cff, #764ba2);
        color: #fff; text-align: center; padding: 72px 20px;
      }
      header.hero h1 { font-size: 40px; margin-bottom: 14px; }
      header.hero p { font-size: 18px; opacity: 0.92; margin-bottom: 24px; }
      .btn {
        display: inline-block; background: #fff; color: #764ba2;
        padding: 13px 30px; border-radius: 28px; font-weight: 700; text-decoration: none;
      }
      section { max-width: 920px; margin: 0 auto; padding: 56px 20px; }
      section h2 { font-size: 28px; text-align: center; margin-bottom: 32px; }
      .features { display: grid; grid-template-columns: repeat(3, 1fr); gap: 22px; }
      .feature { border: 1px solid #e4e4ef; border-radius: 14px; padding: 26px 20px; text-align: center; }
      .feature .icon { font-size: 38px; margin-bottom: 10px; }
      .feature h3 { font-size: 18px; margin-bottom: 6px; }
      .feature p { font-size: 14px; color: #555; }
      footer { background: #1a1a2e; color: #aaa; text-align: center; padding: 28px; font-size: 13px; }
    </style>
  </head>
  <body>
    <!-- AIが生成したランディングページのサンプル。要素をクリックしてコメントしてみてください。 -->
    <header class="hero">
      <h1>AI Review Comments</h1>
      <p>レンダリング結果を見ながらコメント。AI向けプロンプトに変換。</p>
      <a href="#" class="btn">無料で始める</a>
    </header>

    <section id="features">
      <h2>主な機能</h2>
      <div class="features">
        <div class="feature">
          <div class="icon">👁</div>
          <h3>プレビューでレビュー</h3>
          <p>HTML/Markdown を見た目のまま確認できます。</p>
        </div>
        <div class="feature">
          <div class="icon">💬</div>
          <h3>その場でコメント</h3>
          <p>要素や行をクリックして指摘を書き込めます。</p>
        </div>
        <div class="feature">
          <div class="icon">📋</div>
          <h3>プロンプト化</h3>
          <p>位置情報つきで AI 向けプロンプトをコピー。</p>
        </div>
      </div>
    </section>

    <footer>© 2026 AI Review Comments — sample page</footer>
  </body>
</html>
