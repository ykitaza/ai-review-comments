# Sample config for trying source-mode review.
# Open this file in the review panel, click a line (or drag a range), and the
# comment will capture its data path (e.g. services.web.ports).
version: "3.8"

services:
  web:
    image: nginx:1.25
    ports:
      - "80:80"
      - "443:443"
    environment:
      - NODE_ENV=production

  api:
    build: ./api
    ports:
      - "3000:3000"
    depends_on:
      - db

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: app
